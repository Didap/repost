services:
  repost:
    build: .
    image: repost:latest
    container_name: repost
    restart: unless-stopped
    environment:
      IG_TARGET_USERNAME: ${IG_TARGET_USERNAME:-}
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS:-600}
      CAPTION_TEMPLATE: ${CAPTION_TEMPLATE:-"{caption}"}
      SKIP_INITIAL: ${SKIP_INITIAL:-true}
      IG_SESSIONID: ${IG_SESSIONID:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      DASHBOARD_HOST: ${DASHBOARD_HOST:-0.0.0.0}
      DASHBOARD_PORT: ${DASHBOARD_PORT:-8000}
      COOKIE_SECRET: ${COOKIE_SECRET:-}
    expose:
      - "8000"
    volumes:
      - repost_data:/app/data

volumes:
  repost_data:
